name: codewithkasa-prod

services:
  redis:
    image: redis:7-alpine
    container_name: codewithkasa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  server:
    image: ${SERVER_IMAGE}
    container_name: codewithkasa-server
    restart: unless-stopped
    env_file:
      - ${PROD_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      DATABASE_SYNC: "false"
      DATABASE_AUTO_LOAD: "true"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  client:
    image: ${CLIENT_IMAGE}
    container_name: codewithkasa-client
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_BASE_URL: http://server:8000
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - server
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    container_name: codewithkasa-postgres
    restart: unless-stopped
    profiles:
      - local-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  redis_data:
  postgres_data:

networks:
  app-network:
    driver: bridge
